version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  inventory:
    build: ./services/inventory
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  payment:
    build: ./services/payment
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  shipment:
    build: ./services/shipment
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway
